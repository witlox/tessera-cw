name: Tessera
options:
  bundleIdPrefix: io.witlox
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

packages:
  TesseraKit:
    path: .

targets:
  Tessera:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Tessera
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: TesseraKit
        product: TesseraKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.witlox.TesseraCrossword
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "6"
        TARGETED_DEVICE_FAMILY: "1,2"           # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Tessera
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: App/Tessera/Resources/Tessera.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        # Simulator ad-hoc-signs with "-" identity; that's what applies the
        # entitlement file at all. Don't disable CODE_SIGNING_ALLOWED here
        # or GameKit reports "missing com.apple.developer.game-center" at
        # runtime even though the entitlements file is right there.
        # Device builds need a real team set via Xcode → Signing &
        # Capabilities; leave DEVELOPMENT_TEAM blank so it isn't committed.
        DEVELOPMENT_TEAM: ""
schemes:
  Tessera:
    build:
      targets:
        Tessera: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
